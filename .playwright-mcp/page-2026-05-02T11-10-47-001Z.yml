    - generic [ref=e480]:
      - generic [ref=e481]:
        - generic [ref=e482]: Quality Gate (Small Caps)
        - generic [ref=e483]: Three-tier graduated filter applied before the SMALL screener weights.
        - generic [ref=e484]:
          - generic [ref=e485]: Tier 1 — Hard Exclusion
          - text: Piotroski F ≤ 1 or Altman Z'' < 0.5.
          - generic [ref=e486]: Tier 2 — Penalty (cap -0.6)
          - list [ref=e487]:
            - listitem [ref=e488]: Loss in 2 of 3 years → -0.25
            - listitem [ref=e489]: Negative 3yr cumulative FCF → -0.2
            - listitem [ref=e490]: Pledge > 50.0% → -0.25
            - listitem [ref=e491]: F = 2–3 → -0.15
            - listitem [ref=e492]: Altman Z'' = 0.5–1.1 → -0.15
